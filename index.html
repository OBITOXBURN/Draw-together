<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DrawTogether Pro 🎨</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7c3aed; --bg: #f1f5f9; --card: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); height: 100vh; overflow: hidden; color: #1e293b; }

        /* --- LOBBY --- */
        #lobby { 
            position: fixed; inset: 0; z-index: 2000; background: linear-gradient(135deg, #a78bfa 0%, #f472b6 100%);
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .lobby-card { 
            background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            width: 100%; max-width: 400px; text-align: center;
        }
        .lobby-card h1 { font-size: 2.5rem; color: var(--primary); margin-bottom: 10px; font-weight: 800; }
        .lobby-card input { 
            width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 16px; 
            margin: 10px 0; outline: none; font-size: 1rem; text-align: center; font-weight: 600;
        }
        .start-btn { 
            width: 100%; padding: 16px; border: none; background: var(--primary); color: white;
            border-radius: 16px; font-weight: 700; font-size: 1.1rem; cursor: pointer; margin-top: 10px;
        }

        /* --- APP --- */
        #app { display: none; flex-direction: column; height: 100vh; }
        
        .header { 
            padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
            background: white; border-bottom: 1px solid #e2e8f0; z-index: 10;
        }
        .room-badge { background: #ede9fe; color: var(--primary); padding: 5px 12px; border-radius: 12px; font-weight: 700; font-size: 0.8rem; }

        .canvas-container { flex: 1; position: relative; overflow: hidden; background: white; }
        canvas { position: absolute; inset: 0; touch-action: none; cursor: crosshair; }

        /* Floating Tool Panel */
        .tool-panel { 
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            background: white; padding: 15px; border-radius: 24px; box-shadow: var(--shadow);
            display: flex; flex-direction: column; gap: 15px; border: 1px solid #e2e8f0; z-index: 100;
        }
        .tool-group { display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .btn { 
            width: 45px; height: 45px; border-radius: 12px; border: none; background: #f8fafc;
            cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: 0.2s;
        }
        .btn.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3); }
        
        /* Color Grid */
        .color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .swatch { width: 22px; height: 22px; border-radius: 6px; cursor: pointer; border: 2px solid white; box-shadow: 0 0 0 1px #e2e8f0; }
        .swatch.selected { box-shadow: 0 0 0 2px var(--primary); }

        /* Bottom Controls (Mobile Friendly) */
        .bottom-bar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: white; padding: 10px 20px; border-radius: 20px; box-shadow: var(--shadow);
            display: flex; align-items: center; gap: 20px; border: 1px solid #e2e8f0; z-index: 100;
        }
        input[type="range"] { cursor: pointer; accent-color: var(--primary); }

        @media (max-width: 600px) {
            .tool-panel { 
                top: auto; bottom: 85px; left: 50%; transform: translateX(-50%); 
                flex-direction: row; width: 90%; justify-content: space-around;
            }
            .tool-group { flex-direction: row; }
            .color-grid { display: none; } /* Hide extra colors on small mobile for space */
            .bottom-bar { width: 90%; justify-content: space-between; bottom: 15px; }
        }
    </style>
</head>
<body>

    <div id="lobby">
        <div class="lobby-card">
            <h1>🎨 DT Pro</h1>
            <p style="color: #64748b; margin-bottom: 20px;">Draw together in real-time!</p>
            <input type="text" id="nameInput" placeholder="Artist Name">
            <input type="text" id="roomInput" placeholder="Room Code (Ex: COOL)">
            <button class="start-btn" onclick="initApp()">Start Jamming 🚀</button>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <div style="font-weight: 800; color: var(--primary);">DRAW TOGETHER</div>
            <div class="room-badge" id="roomCodeDisp">ROOM: ---</div>
            <button onclick="clearCanvas()" style="border:none; background:none; font-weight:700; color:#ef4444; cursor:pointer;">Clear</button>
        </div>

        <div class="canvas-container">
            <div class="tool-panel">
                <div class="tool-group">
                    <button class="btn active" id="brushBtn" onclick="setTool('brush')">🖌️</button>
                    <button class="btn" id="eraserBtn" onclick="setTool('eraser')">🧹</button>
                </div>
                <div class="color-grid">
                    <div class="swatch" style="background:#7c3aed" onclick="setColor('#7c3aed', this)"></div>
                    <div class="swatch" style="background:#ef4444" onclick="setColor('#ef4444', this)"></div>
                    <div class="swatch" style="background:#22c55e" onclick="setColor('#22c55e', this)"></div>
                    <div class="swatch" style="background:#3b82f6" onclick="setColor('#3b82f6', this)"></div>
                    <div class="swatch" style="background:#f59e0b" onclick="setColor('#f59e0b', this)"></div>
                    <div class="swatch" style="background:#000000" onclick="setColor('#000000', this)"></div>
                </div>
                <input type="color" id="customColor" oninput="setColor(this.value)" style="width:45px; height:30px; border:none; cursor:pointer;">
            </div>

            <canvas id="canvas"></canvas>

            <div class="bottom-bar">
                <span style="font-size:0.7rem; font-weight:800;">SIZE</span>
                <input type="range" id="sizeSlider" min="2" max="50" value="8" style="width:150px">
                <button class="btn" onclick="downloadImage()" style="width:35px; height:35px; font-size:1rem;">💾</button>
            </div>
        </div>
    </div>

<script>
    let ably, channel, isDrawing = false;
    let tool = 'brush';
    let color = '#7c3aed';
    let lastX = 0, lastY = 0;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    async function initApp() {
        const name = document.getElementById('nameInput').value.trim();
        const room = document.getElementById('roomInput').value.trim().toUpperCase();
        if (!name || !room) return alert("Bhai, Details toh fill kar!");

        // --- ABLY SETUP ---
        // INSERT YOUR API KEY HERE
        ably = new Ably.Realtime('zpMTtA.ptXYfA:H7fnnOoRNkwrnzG7hms09gmMCNyAXwhH8y0BO73fYPg');
        channel = ably.channels.get('draw-' + room);

        document.getElementById('lobby').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        document.getElementById('roomCodeDisp').innerText = `ROOM: ${room}`;

        setupCanvas();

        // Listen for remote drawing
        channel.subscribe('draw', (msg) => {
            if (msg.clientId !== ably.auth.clientId) {
                drawRemote(msg.data);
            }
        });

        // Listen for clear
        channel.subscribe('clear', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });
    }

    function setupCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 60;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Mouse
        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', move);
        window.addEventListener('mouseup', stop);

        // Touch (Mobile)
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e.touches[0]); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e.touches[0]); }, {passive: false});
        canvas.addEventListener('touchend', stop);
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function start(e) {
        isDrawing = true;
        const pos = getPos(e);
        [lastX, lastY] = [pos.x, pos.y];
    }

    function move(e) {
        if (!isDrawing) return;
        const pos = getPos(e);
        const size = document.getElementById('sizeSlider').value;
        const currentStrokeColor = tool === 'eraser' ? '#ffffff' : color;

        const data = {
            x1: lastX, y1: lastY,
            x2: pos.x, y2: pos.y,
            c: currentStrokeColor,
            s: size
        };

        drawOnCanvas(data);
        channel.publish('draw', data); // Real-time send
        
        [lastX, lastY] = [pos.x, pos.y];
    }

    function stop() { isDrawing = false; ctx.beginPath(); }

    function drawOnCanvas(data) {
        ctx.beginPath();
        ctx.strokeStyle = data.c;
        ctx.lineWidth = data.s;
        ctx.moveTo(data.x1, data.y1);
        ctx.lineTo(data.x2, data.y2);
        ctx.stroke();
    }

    function drawRemote(data) {
        drawOnCanvas(data);
    }

    // --- TOOL ACTIONS ---
    function setTool(t) {
        tool = t;
        document.getElementById('brushBtn').classList.toggle('active', t === 'brush');
        document.getElementById('eraserBtn').classList.toggle('active', t === 'eraser');
    }

    function setColor(c, el) {
        color = c;
        if(el) {
            document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
            el.classList.add('selected');
        }
    }

    function clearCanvas() {
        if(confirm("Sabka canvas clear ho jayega. Ok?")) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            channel.publish('clear', {});
        }
    }

    function downloadImage() {
        const link = document.createElement('a');
        link.download = 'drawing.png';
        link.href = canvas.toDataURL();
        link.click();
    }

    window.onresize = setupCanvas;
</script>
</body>
</html>
