<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DrawTogether</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0c0c10;
  --surf:    #14141c;
  --surf2:   #1c1c28;
  --border:  #272736;
  --pink:    #ff3d8a;
  --violet:  #7c3aed;
  --cyan:    #06b6d4;
  --green:   #10b981;
  --text:    #ede9fe;
  --muted:   #64638a;
}
* { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; }

/* ────────────────── LOBBY ────────────────── */
#lobby {
  position: fixed; inset: 0; z-index: 200;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse 100% 70% at 50% -10%, #1f0640 0%, var(--bg) 65%);
  padding: 16px;
}
.card {
  background: var(--surf); border: 1px solid var(--border);
  border-radius: 26px; padding: 32px 28px 28px;
  width: 100%; max-width: 420px;
  box-shadow: 0 0 100px rgba(124,58,237,.12), 0 40px 80px rgba(0,0,0,.6);
}
.logo {
  font-family: 'Syne', sans-serif; font-size: 2.1rem; font-weight: 800;
  text-align: center; letter-spacing: -1px; margin-bottom: 4px;
  background: linear-gradient(120deg, var(--pink) 0%, var(--violet) 55%, var(--cyan) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.tagline { text-align: center; font-size: .7rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 28px; }

.lbl { font-size: .67rem; font-weight: 600; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; margin-top: 16px; }
.inp {
  width: 100%; padding: 12px 16px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 12px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: .95rem; font-weight: 500;
  outline: none; transition: border-color .2s, box-shadow .2s;
}
.inp:focus { border-color: var(--violet); box-shadow: 0 0 0 3px rgba(124,58,237,.18); }
.inp::placeholder { color: var(--muted); }

/* Tabs */
.tabs { display: flex; gap: 8px; margin-top: 24px; margin-bottom: 4px; background: var(--bg); border-radius: 14px; padding: 4px; }
.tab {
  flex: 1; padding: 10px; border: none; border-radius: 10px;
  font-family: 'Syne', sans-serif; font-size: .85rem; font-weight: 700;
  cursor: pointer; transition: all .2s; color: var(--muted); background: transparent;
}
.tab.active { background: var(--surf2); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,.3); }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

.action-btn {
  width: 100%; padding: 14px; margin-top: 18px;
  border: none; border-radius: 14px; cursor: pointer;
  font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800;
  color: #fff; letter-spacing: .3px;
  transition: transform .15s, box-shadow .2s;
}
.action-btn:hover { transform: translateY(-2px); }
.action-btn:active { transform: translateY(1px); }
.btn-host { background: linear-gradient(135deg, var(--pink), var(--violet)); box-shadow: 0 0 24px rgba(255,61,138,.3); }
.btn-join { background: linear-gradient(135deg, var(--cyan), var(--violet)); box-shadow: 0 0 24px rgba(6,182,212,.25); }

/* Room ID display after hosting */
.room-reveal {
  display: none; margin-top: 16px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px;
}
.room-reveal-label { font-size: .65rem; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
.room-id-row { display: flex; align-items: center; gap: 10px; }
.room-id-text { font-family: 'Syne', sans-serif; font-size: .85rem; font-weight: 700; color: var(--cyan); flex: 1; word-break: break-all; letter-spacing: .5px; }
.copy-btn {
  padding: 7px 14px; background: rgba(6,182,212,.12); border: 1px solid rgba(6,182,212,.3);
  color: var(--cyan); border-radius: 9px; font-size: .75rem; font-weight: 700;
  cursor: pointer; white-space: nowrap; transition: background .2s;
}
.copy-btn:hover { background: rgba(6,182,212,.22); }
.room-hint { font-size: .72rem; color: var(--muted); margin-top: 8px; line-height: 1.5; }

/* ────────────────── APP ────────────────── */
#app { display: none; flex-direction: column; height: 100dvh; }

.topbar {
  height: 50px; flex-shrink: 0;
  background: var(--surf); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 12px; gap: 8px;
}
.top-logo {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem;
  background: linear-gradient(135deg, var(--pink), var(--violet));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.top-chip {
  font-size: .67rem; font-weight: 700; letter-spacing: 1px;
  padding: 4px 10px; border-radius: 20px; cursor: pointer;
}
.chip-room { background: rgba(6,182,212,.1); border: 1px solid rgba(6,182,212,.25); color: var(--cyan); }
.chip-peers { background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.25); color: var(--green); }
.top-spacer { flex: 1; }
.exit-btn {
  padding: 5px 12px; background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2);
  color: #f87171; border-radius: 9px; font-size: .72rem; font-weight: 600; cursor: pointer; transition: background .2s;
}
.exit-btn:hover { background: rgba(239,68,68,.18); }

.workspace { display: flex; flex: 1; overflow: hidden; }

/* ────────────────── TOOLBAR ────────────────── */
.toolbar {
  width: 62px; flex-shrink: 0;
  background: var(--surf); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 0; gap: 5px; overflow-y: auto;
}
.sep { width: 38px; height: 1px; background: var(--border); margin: 3px 0; flex-shrink: 0; }
.tbtn {
  width: 42px; height: 42px; border-radius: 11px;
  border: 1px solid transparent; background: transparent;
  font-size: 1.05rem; cursor: pointer; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.tbtn:hover { background: var(--surf2); color: var(--text); }
.tbtn.on { background: rgba(124,58,237,.2); border-color: var(--violet); color: var(--text); box-shadow: 0 0 10px rgba(124,58,237,.25); }

/* Color swatch picker button */
.cur-color-btn {
  width: 42px; height: 42px; border-radius: 11px;
  border: 1px solid var(--border); background: var(--surf2);
  position: relative; overflow: hidden; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.cur-color-dot { width: 26px; height: 26px; border-radius: 7px; pointer-events: none; }
.cur-color-btn input[type=color] { position: absolute; inset: -8px; width: calc(100%+16px); height: calc(100%+16px); opacity: 0; cursor: pointer; }

/* Swatches */
.swatches { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 0 8px; }
.sw {
  width: 20px; height: 20px; border-radius: 6px; cursor: pointer;
  border: 2px solid transparent; transition: transform .12s, border-color .12s, box-shadow .12s;
  flex-shrink: 0;
}
.sw:hover { transform: scale(1.25); }
.sw.sel { border-color: #fff; box-shadow: 0 0 0 2px var(--violet); }

/* Size slider */
.size-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.size-num { font-size: .6rem; color: var(--muted); font-weight: 700; }
input[type=range] {
  -webkit-appearance: none; writing-mode: vertical-lr; direction: rtl;
  width: 5px; height: 60px; background: var(--surf2); border-radius: 3px; outline: none; cursor: pointer; border: none;
}
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: var(--violet); box-shadow: 0 0 6px rgba(124,58,237,.5); cursor: pointer; }

/* Canvas */
.canvaswrap { flex: 1; position: relative; background: #fff; overflow: hidden; }
#mainCanvas { position: absolute; top: 0; left: 0; cursor: crosshair; display: block; }

/* Toast */
#toast {
  position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
  background: var(--surf2); border: 1px solid var(--border);
  color: var(--text); font-size: .78rem; font-weight: 600;
  padding: 8px 20px; border-radius: 20px; white-space: nowrap;
  box-shadow: 0 8px 24px rgba(0,0,0,.5);
  opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 9999;
}
#toast.show { opacity: 1; }

/* Connecting overlay */
#connectingOverlay {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(12,12,16,.85); backdrop-filter: blur(6px);
  align-items: center; justify-content: center; flex-direction: column; gap: 14px;
}
#connectingOverlay.show { display: flex; }
.spinner {
  width: 36px; height: 36px; border-radius: 50%;
  border: 3px solid var(--border); border-top-color: var(--violet);
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.conn-text { font-family: 'Syne', sans-serif; font-weight: 700; font-size: .9rem; color: var(--muted); }

@media (max-width: 480px) {
  .toolbar { width: 54px; }
  .tbtn, .cur-color-btn { width: 37px; height: 37px; }
  .swatches { gap: 4px; padding: 0 6px; }
  .sw { width: 17px; height: 17px; }
  input[type=range] { height: 52px; }
}
</style>
</head>
<body>

<!-- ═══════════════ LOBBY ═══════════════ -->
<div id="lobby">
  <div class="card">
    <div class="logo">DrawTogether</div>
    <div class="tagline">Peer · Real-time · No signup needed</div>

    <div class="lbl">Aapka Naam</div>
    <input class="inp" id="iName" type="text" placeholder="e.g. Rahul" maxlength="14">

    <div class="tabs">
      <button class="tab active" onclick="switchTab('host',this)">🎨 New Room</button>
      <button class="tab" onclick="switchTab('join',this)">🔗 Join Room</button>
    </div>

    <!-- HOST PANEL -->
    <div class="tab-panel active" id="panelHost">
      <button class="action-btn btn-host" onclick="doHost()">Create Room &amp; Start Drawing</button>
      <div class="room-reveal" id="roomReveal">
        <div class="room-reveal-label">Ye Room ID apne dost ko bhejo</div>
        <div class="room-id-row">
          <div class="room-id-text" id="roomIdText">—</div>
          <button class="copy-btn" onclick="copyId()">Copy</button>
        </div>
        <div class="room-hint">Dost Join Room tab mein ye ID paste kare → connect ho jayenge!</div>
      </div>
    </div>

    <!-- JOIN PANEL -->
    <div class="tab-panel" id="panelJoin">
      <div class="lbl" style="margin-top:14px">Room ID (host ne bheja)</div>
      <input class="inp" id="iRoomId" type="text" placeholder="Paste karo yahan..." style="letter-spacing:.5px; font-size:.85rem;">
      <button class="action-btn btn-join" onclick="doJoin()">Join &amp; Start Drawing</button>
    </div>
  </div>
</div>

<!-- ═══════════════ CONNECTING ═══════════════ -->
<div id="connectingOverlay">
  <div class="spinner"></div>
  <div class="conn-text" id="connText">Connecting...</div>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div id="app">
  <div class="topbar">
    <span class="top-logo">DT</span>
    <div class="top-chip chip-room" id="chipRoom" onclick="copyId()" title="Click to copy Room ID">ROOM: —</div>
    <div class="top-chip chip-peers" id="chipPeers">● 1 Online</div>
    <div class="top-spacer"></div>
    <button class="exit-btn" onclick="location.reload()">✕ Exit</button>
  </div>

  <div class="workspace">
    <div class="toolbar" id="toolbar">
      <!-- Tools -->
      <button class="tbtn on" id="btnBrush" onclick="setTool('brush',this)" title="Brush">🖌️</button>
      <button class="tbtn" id="btnEraser" onclick="setTool('eraser',this)" title="Eraser">⬜</button>
      <div class="sep"></div>

      <!-- Active color + picker -->
      <div class="cur-color-btn" title="Color choose karo">
        <div class="cur-color-dot" id="curDot" style="background:#e63946"></div>
        <input type="color" id="cpInput" value="#e63946" oninput="pickColor(this.value)">
      </div>
      <div class="sep"></div>

      <!-- Swatches -->
      <div class="swatches" id="swatchGrid"></div>
      <div class="sep"></div>

      <!-- Size -->
      <div class="size-wrap">
        <div class="size-num" id="szNum">6</div>
        <input type="range" id="szRange" min="2" max="60" value="6" oninput="szNum.textContent=this.value">
      </div>
      <div style="flex:1"></div>
      <div class="sep"></div>

      <!-- Clear -->
      <button class="tbtn" onclick="doClear()" title="Clear canvas" style="color:#f87171">🗑️</button>
    </div>

    <div class="canvaswrap" id="canvaswrap">
      <canvas id="mainCanvas"></canvas>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════
   PALETTE & TOOL STATE
═══════════════════════════════════════════ */
const COLORS = [
  '#e63946','#ff6b35','#ffd166','#06d6a0',
  '#4cc9f0','#7c3aed','#f72585','#b5e48c',
  '#ffffff','#adb5bd','#495057','#212529'
];
let curColor = '#e63946';
let curTool  = 'brush';

function buildSwatches() {
  const g = document.getElementById('swatchGrid');
  g.innerHTML = '';
  COLORS.forEach(c => {
    const el = document.createElement('div');
    el.className = 'sw' + (c === curColor ? ' sel' : '');
    el.style.background = c;
    el.onclick = () => {
      setColor(c);
      document.getElementById('cpInput').value = c;
      if (curTool === 'eraser') setTool('brush', document.getElementById('btnBrush'));
    };
    g.appendChild(el);
  });
}

function setColor(v) {
  curColor = v;
  document.getElementById('curDot').style.background = v;
  document.querySelectorAll('.sw').forEach(s => {
    const bg = s.style.background;
    s.classList.toggle('sel', bg === v || bg === hexToRgbStr(v));
  });
}

function pickColor(v) {
  setColor(v);
  if (curTool === 'eraser') setTool('brush', document.getElementById('btnBrush'));
}

function hexToRgbStr(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${r}, ${g}, ${b})`;
}

function setTool(t, btn) {
  curTool = t;
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('mainCanvas').style.cursor = t === 'eraser' ? 'cell' : 'crosshair';
}

buildSwatches();

/* ═══════════════════════════════════════════
   CANVAS ENGINE
   KEY FIXES:
   1. Normalized coords (0–1) so lines are same on all screens
   2. ctx state fully reset before every stroke (no bleed)
   3. globalAlpha = 1, no shadow, compositeOp = source-over always
═══════════════════════════════════════════ */
const canvas = document.getElementById('mainCanvas');
const ctx    = canvas.getContext('2d');

function resetCtx() {
  ctx.globalAlpha          = 1;
  ctx.globalCompositeOperation = 'source-over';
  ctx.shadowBlur           = 0;
  ctx.shadowColor          = 'transparent';
  ctx.lineCap              = 'round';
  ctx.lineJoin             = 'round';
}

function resizeCanvas() {
  const wrap  = document.getElementById('canvaswrap');
  const snap  = ctx.getImageData(0, 0, canvas.width || 1, canvas.height || 1);
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  resetCtx();
  try { ctx.putImageData(snap, 0, 0); } catch(_) {}
}

/* Normalized ↔ pixel */
function toNorm(px, py)  { return { x: px / canvas.width,  y: py / canvas.height  }; }
function toPx(nx, ny)    { return { x: nx * canvas.width,  y: ny * canvas.height  }; }

function pointerPos(e) {
  const r   = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - r.left, y: src.clientY - r.top };
}

/* Low-level draw — always clean context */
function drawSeg(fromNorm, toNorm_, col, sz) {
  const a = toPx(fromNorm.x, fromNorm.y);
  const b = toPx(toNorm_.x,  toNorm_.y);
  resetCtx();
  ctx.strokeStyle = col;
  ctx.lineWidth   = sz;
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.stroke();
}

function drawDot(norm, col, sz) {
  const p = toPx(norm.x, norm.y);
  resetCtx();
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.arc(p.x, p.y, Math.max(sz / 2, 1), 0, Math.PI * 2);
  ctx.fill();
}

/* ── Local drawing ── */
let isDown   = false;
let lastNorm = null;

function strokeColor() { return curTool === 'eraser' ? '#ffffff' : curColor; }
function strokeSize()  { return +document.getElementById('szRange').value; }

function onDown(e) {
  e.preventDefault();
  isDown = true;
  const lp = pointerPos(e);
  lastNorm = toNorm(lp.x, lp.y);
  const col = strokeColor(), sz = strokeSize();
  drawDot(lastNorm, col, sz);
  broadcast({ t:'dot', n: lastNorm, col, sz });
}

function onMove(e) {
  e.preventDefault();
  if (!isDown || !lastNorm) return;
  const lp   = pointerPos(e);
  const norm = toNorm(lp.x, lp.y);
  const col  = strokeColor(), sz = strokeSize();
  drawSeg(lastNorm, norm, col, sz);
  broadcast({ t:'seg', f: lastNorm, to: norm, col, sz });
  lastNorm = norm;
}

function onUp(e) {
  if (!isDown) return;
  isDown   = false;
  lastNorm = null;
  broadcast({ t:'end' });
}

canvas.addEventListener('mousedown',  onDown, { passive: false });
canvas.addEventListener('mousemove',  onMove, { passive: false });
window.addEventListener('mouseup',    onUp);
canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove',  onMove, { passive: false });
canvas.addEventListener('touchend',   onUp,   { passive: false });
window.addEventListener('resize',     resizeCanvas);

/* ── Remote drawing ── */
const remoteState = {}; // peerId → { lastNorm }

function applyRemote(data, pid) {
  if (!remoteState[pid]) remoteState[pid] = { lastNorm: null };
  const rs = remoteState[pid];

  if (data.t === 'dot') {
    drawDot(data.n, data.col, data.sz);
    rs.lastNorm = data.n;
  } else if (data.t === 'seg' && rs.lastNorm) {
    drawSeg(rs.lastNorm, data.to, data.col, data.sz);
    rs.lastNorm = data.to;
  } else if (data.t === 'end') {
    rs.lastNorm = null;
  } else if (data.t === 'clear') {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
}

function doClear() {
  if (!confirm('Sabka canvas clear ho jayega?')) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  broadcast({ t: 'clear' });
}

/* ═══════════════════════════════════════════
   PEER JS LAYER
   HOST = accepts connections, relays to all
   JOINER = connects to host only
═══════════════════════════════════════════ */
let peer    = null;
let myId    = null;
let isHost  = false;
const conns = {};   // peerId → DataConnection

function broadcast(data, exceptId) {
  Object.entries(conns).forEach(([pid, c]) => {
    if (pid !== exceptId && c.open) c.send(data);
  });
}

function onData(data, fromId) {
  applyRemote(data, fromId);
  if (isHost) broadcast(data, fromId); // relay to others if host
}

function wireConn(conn) {
  const pid = conn.peer;
  conns[pid] = conn;
  conn.on('data',  d => onData(d, pid));
  conn.on('open',  () => { updatePeers(); toast('🎉 Friend joined!'); });
  conn.on('close', () => { delete conns[pid]; delete remoteState[pid]; updatePeers(); toast('Friend left.'); });
  conn.on('error', () => { delete conns[pid]; delete remoteState[pid]; updatePeers(); });
}

function updatePeers() {
  const n = Object.keys(conns).length + 1;
  document.getElementById('chipPeers').textContent = `● ${n} Online`;
}

function makePeer(onOpen) {
  peer = new Peer(undefined, { debug: 0 });
  peer.on('open', id => { myId = id; if (onOpen) onOpen(id); });
  peer.on('connection', conn => { if (isHost) wireConn(conn); });
  peer.on('error', err => { toast('⚠️ Error: ' + err.type); hideCo
