<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DrawTogether Pro 🎨</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7c3aed;
            --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.9);
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); height: 100vh; overflow: hidden; color: #1e293b; }

        /* --- LOBBY --- */
        #lobby { 
            position: fixed; inset: 0; z-index: 1000; background: linear-gradient(135deg, #ddd6fe 0%, #fae8ff 100%);
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .lobby-card { 
            background: white; padding: 40px; border-radius: 30px; box-shadow: var(--shadow);
            width: 100%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.5);
        }
        .lobby-card h1 { font-weight: 800; font-size: 2.2rem; color: var(--primary); margin-bottom: 8px; }
        .lobby-card input { 
            width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 16px; 
            margin: 10px 0; outline: none; transition: 0.3s; font-size: 1rem; text-align: center;
        }
        .lobby-card input:focus { border-color: var(--primary); background: #f5f3ff; }
        .start-btn { 
            width: 100%; padding: 16px; border: none; background: var(--primary); color: white;
            border-radius: 16px; font-weight: 600; font-size: 1.1rem; cursor: pointer; transition: 0.3s;
        }
        .start-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(124, 58, 237, 0.4); }

        /* --- APP UI --- */
        #app { display: none; flex-direction: column; height: 100vh; }
        
        .header { 
            padding: 15px 25px; display: flex; align-items: center; justify-content: space-between;
            background: var(--card); backdrop-filter: blur(10px); z-index: 10; border-bottom: 1px solid #e2e8f0;
        }
        .room-tag { background: #f1f5f9; padding: 6px 14px; border-radius: 100px; font-size: 0.85rem; font-weight: 600; color: #64748b; }

        .canvas-area { flex: 1; position: relative; cursor: crosshair; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; }

        /* Floating Toolbar */
        .toolbar { 
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            background: var(--card); backdrop-filter: blur(15px); padding: 12px; border-radius: 20px;
            display: flex; flex-direction: column; gap: 12px; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.8);
        }
        .tool-btn { 
            width: 48px; height: 48px; border-radius: 14px; border: none; background: transparent;
            cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; transition: 0.2s;
        }
        .tool-btn:hover { background: #f1f5f9; }
        .tool-btn.active { background: var(--primary); color: white; }

        .color-circle { 
            width: 32px; height: 32px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.1);
            cursor: pointer; padding: 0; overflow: hidden;
        }
        input[type="color"] { opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        .size-slider { 
            writing-mode: bt-lr; /* Vertical slider */
            -webkit-appearance: slider-vertical; width: 8px; height: 100px; padding: 0 15px;
        }

        #status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 6px; }

        @media (max-width: 600px) {
            .toolbar { 
                left: 50%; bottom: 30px; top: auto; transform: translateX(-50%);
                flex-direction: row; padding: 8px 15px; width: auto;
            }
            .size-slider { display: none; } /* Hide vertical slider on mobile for space */
        }
    </style>
</head>
<body>

    <div id="lobby">
        <div class="lobby-card">
            <h1>DrawTogether</h1>
            <p style="color: #64748b; margin-bottom: 20px;">Real-time Collaborative Canvas</p>
            <input type="text" id="nameInput" placeholder="What's your name?">
            <input type="text" id="roomInput" placeholder="Room Code (e.g. PARTY)">
            <button class="start-btn" onclick="connect()">Join Room 🚀</button>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <div style="font-weight: 800; font-size: 1.2rem; color: var(--primary);">DT.</div>
            <div class="room-tag">Room: <span id="roomNameDisplay" style="color: #1e293b;">---</span></div>
            <div style="font-size: 0.8rem; font-weight: 600;"><span id="status-dot"></span>Online</div>
        </div>

        <div class="canvas-area">
            <div class="toolbar">
                <button class="tool-btn active" onclick="setTool('brush', this)">🖌️</button>
                <button class="tool-btn" onclick="setTool('eraser', this)">🧹</button>
                <div class="color-circle" id="colorPreview" style="background: #7c3aed;">
                    <input type="color" id="colorInput" oninput="updateColor(this.value)">
                </div>
                <input type="range" class="size-slider" id="sizeInput" min="2" max="40" value="6">
                <button class="tool-btn" onclick="clearCanvas()" title="Clear">🗑️</button>
            </div>
            <canvas id="canvas"></canvas>
        </div>
    </div>

<script>
    let ably, channel, myClientId;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;
    let currentTool = 'brush';
    let currentColor = '#7c3aed';
    let lastX = 0;
    let lastY = 0;

    async function connect() {
        const name = document.getElementById('nameInput').value.trim();
        const room = document.getElementById('roomInput').value.trim().toUpperCase();
        
        if (!name || !room) return alert("Bhai, name aur room code daal de!");

        // Replace with your real Ably API Key
        ably = new Ably.Realtime('YOUR_ABLY_API_KEY');
        channel = ably.channels.get('room-' + room);
        
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        document.getElementById('roomNameDisplay').innerText = room;

        setupCanvas();

        // Remote Drawing Listen
        channel.subscribe('draw', (msg) => {
            if (msg.clientId !== ably.auth.clientId) {
                renderRemoteDrawing(msg.data);
            }
        });

        // Remote Clear Listen
        channel.subscribe('clear', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });
    }

    function setupCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        // Mouse Events
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);

        // Touch Events
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e.touches[0]); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); });
        canvas.addEventListener('touchend', stopDrawing);
    }

    function startDrawing(e) {
        isDrawing = true;
        const { x, y } = getPointerPos(e);
        [lastX, lastY] = [x, y];
    }

    function draw(e) {
        if (!isDrawing) return;
        const { x, y } = getPointerPos(e);
        const size = document.getElementById('sizeInput').value;
        const color = currentTool === 'eraser' ? '#f8fafc' : currentColor;

        const drawData = {
            x1: lastX, y1: lastY, 
            x2: x, y2: y, 
            color: color, 
            size: size
        };

        renderStroke(drawData);
        channel.publish('draw', drawData); // Send to Ably

        [lastX, lastY] = [x, y];
    }

    function renderStroke(data) {
        ctx.beginPath();
        ctx.strokeStyle = data.color;
        ctx.lineWidth = data.size;
        ctx.moveTo(data.x1, data.y1);
        ctx.lineTo(data.x2, data.y2);
        ctx.stroke();
        ctx.closePath();
    }

    function renderRemoteDrawing(data) {
        // Smoothing remote strokes
        ctx.beginPath();
        ctx.strokeStyle = data.color;
        ctx.lineWidth = data.size;
        ctx.moveTo(data.x1, data.y1);
        ctx.lineTo(data.x2, data.y2);
        ctx.stroke();
        ctx.closePath();
    }

    function getPointerPos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: e.clientX - rect.left,
            y: e.clientY - rect.top
        };
    }

    function stopDrawing() { isDrawing = false; }

    function setTool(tool, btn) {
        currentTool = tool;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function updateColor(val) {
        currentColor = val;
        document.getElementById('colorPreview').style.background = val;
    }

    function clearCanvas() {
        if (confirm("Pura canvas saaf kar dein?")) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            channel.publish('clear', {});
        }
    }

    window.onresize = () => {
        const tempImage = ctx.getImageData(0,0, canvas.width, canvas.height);
        setupCanvas();
        ctx.putImageData(tempImage, 0,0);
    };
</script>
</body>
</html>
