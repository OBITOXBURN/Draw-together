<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎨 DrawTogether — Live Collab</title>
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf6ff; --accent1: #ff6eb4; --accent2: #a78bfa;
    --accent3: #34d399; --text: #2d1b69; --shadow: 0 8px 25px rgba(167,139,250,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

  /* LOBBY */
  #lobby { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .card { background: white; padding: 30px; border-radius: 25px; box-shadow: var(--shadow); width: 100%; max-width: 400px; text-align: center; }
  .logo { font-family: 'Fredoka One'; font-size: 2.2rem; background: linear-gradient(135deg, var(--accent1), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
  
  input { width: 100%; padding: 12px; border: 2px solid #e9d5ff; border-radius: 12px; margin: 10px 0; font-weight: 700; text-align: center; font-size: 1rem; }
  .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-family: 'Fredoka One'; cursor: pointer; transition: 0.2s; color: white; font-size: 1rem; }
  .btn-primary { background: linear-gradient(135deg, var(--accent1), var(--accent2)); margin-top: 10px; }

  /* APP */
  #app { display: none; flex-direction: column; height: 100vh; }
  .top-bar { height: 60px; background: white; border-bottom: 2px solid #f3e8ff; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; }
  .room-info { font-weight: 800; font-size: 0.8rem; background: #f3e8ff; padding: 5px 12px; border-radius: 15px; }

  .main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
  
  /* MOBILE TOOLBAR (BOTTOM OR SIDE) */
  .toolbar { width: 70px; background: white; border-right: 1px solid #f3e8ff; display: flex; flex-direction: column; align-items: center; padding: 10px 5px; gap: 12px; overflow-y: auto; }
  .tool-btn { width: 45px; height: 45px; border-radius: 12px; border: 2px solid transparent; background: #f8fafc; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .tool-btn.active { border-color: var(--accent2); background: #ede9fe; }

  .canvas-wrap { flex: 1; position: relative; background: #fff; }
  canvas { position: absolute; top: 0; left: 0; }

  #status { position: fixed; top: 70px; right: 10px; font-size: 0.7rem; font-weight: bold; color: var(--accent3); }

  @media (max-width: 600px) {
    .toolbar { width: 60px; }
    .tool-btn { width: 38px; height: 38px; font-size: 1rem; }
  }
</style>
</head>
<body>

<div id="lobby">
  <div class="card">
    <div class="logo">DrawTogether</div>
    <input type="text" id="nameInput" placeholder="Your Name" maxlength="10">
    <input type="text" id="roomInput" placeholder="Room Code (e.g. FUN12)" maxlength="6" style="text-transform: uppercase;">
    <button class="btn btn-primary" onclick="initAbly()">Start Drawing 🎨</button>
    <p style="font-size: 0.8rem; color: #999; margin-top: 15px;">Enter same room code to draw with friends!</p>
  </div>
</div>

<div id="app">
  <div class="top-bar">
    <span style="font-family:'Fredoka One'; color: var(--accent1)">DT</span>
    <div class="room-info" id="roomDisplay">ROOM: ---</div>
    <button class="btn" style="width:auto; padding:5px 10px; background:#fee2e2; color:#ef4444; font-size:0.7rem" onclick="location.reload()">Exit</button>
  </div>

  <div class="main-container">
    <div class="toolbar">
      <button class="tool-btn active" data-tool="brush" onclick="changeTool('brush', this)">🖌️</button>
      <button class="tool-btn" data-tool="eraser" onclick="changeTool('eraser', this)">🧹</button>
      <input type="color" id="colorPicker" value="#ff6eb4" style="width:35px; height:35px; border:none; padding:0; background:none;">
      <input type="range" id="sizePicker" min="2" max="40" value="5" style="width:45px">
      <div style="flex:1"></div>
      <button class="tool-btn" onclick="clearLocalCanvas()" style="background:#fee2e2">🗑️</button>
    </div>

    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="mainCanvas"></canvas>
    </div>
  </div>
  <div id="status">Connecting...</div>
</div>

<script>
  let ably, channel;
  let isDrawing = false;
  let currentTool = 'brush';
  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');
  
  // --- ABLY INTEGRATION ---
  async function initAbly() {
    const name = document.getElementById('nameInput').value || "Guest";
    const room = document.getElementById('roomInput').value.toUpperCase() || "GLOBAL";
    
    if(!name || !room) return alert("Name aur Room Code zaroori hai!");

    // REPLACE THIS WITH YOUR API KEY
    ably = new Ably.Realtime('zpMTtA.ptXYfA:H7fnnOoRNkwrnzG7hms09gmMCNyAXwhH8y0BO73fYPg'); 
    
    channel = ably.channels.get('drawing-' + room);

    document.getElementById('lobby').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('roomDisplay').innerText = `ROOM: ${room}`;
    
    resizeCanvas();
    document.getElementById('status').innerText = "Online 🟢";

    // Listen for drawing data from others
    channel.subscribe('draw', (msg) => {
      if (msg.clientId !== ably.auth.clientId) {
        drawRemote(msg.data);
      }
    });

    // Listen for clear canvas
    channel.subscribe('clear', () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    });
  }

  // --- DRAWING LOGIC ---
  function resizeCanvas() {
    const wrap = document.getElementById('canvasWrap');
    canvas.width = wrap.clientWidth;
    canvas.height = wrap.clientHeight;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: clientX - rect.left,
      y: clientY - rect.top
    };
  }

  function startDrawing(e) {
    isDrawing = true;
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    emitDraw(pos.x, pos.y, 'start');
  }

  function drawingMove(e) {
    if (!isDrawing) return;
    const pos = getPos(e);
    
    const color = currentTool === 'eraser' ? '#ffffff' : document.getElementById('colorPicker').value;
    const size = document.getElementById('sizePicker').value;

    ctx.strokeStyle = color;
    ctx.lineWidth = size;
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();

    emitDraw(pos.x, pos.y, 'move', color, size);
  }

  function stopDrawing() {
    isDrawing = false;
    ctx.closePath();
  }

  // Send data to Ably
  function emitDraw(x, y, type, color, size) {
    if (channel) {
      channel.publish('draw', { x, y, type, color, size });
    }
  }

  // Draw data received from others
  function drawRemote(data) {
    ctx.strokeStyle = data.color;
    ctx.lineWidth = data.size;
    if (data.type === 'start') {
      ctx.beginPath();
      ctx.moveTo(data.x, data.y);
    } else {
      ctx.lineTo(data.x, data.y);
      ctx.stroke();
    }
  }

  function clearLocalCanvas() {
    if(confirm("Sabka canvas saaf ho jayega. Sure?")) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      channel.publish('clear', {});
    }
  }

  function changeTool(tool, btn) {
    currentTool = tool;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  // Event Listeners for PC & Mobile
  canvas.addEventListener('mousedown', startDrawing);
  canvas.addEventListener('mousemove', drawingMove);
  window.addEventListener('mouseup', stopDrawing);

  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); }, {passive: false});
  canvas.addEventListener('touchmove', (e) => { e.preventDefault(); drawingMove(e); }, {passive: false});
  canvas.addEventListener('touchend', stopDrawing);

  window.onresize = resizeCanvas;
</script>

</body>
</html>
