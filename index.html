<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DrawTogether</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d12;
    --surf: #16161f;
    --surf2: #1e1e2a;
    --border: #2a2a3a;
    --pink: #ff4d8d;
    --violet: #7c3aed;
    --cyan: #06b6d4;
    --green: #10b981;
    --red: #ef4444;
    --text: #f1f0ff;
    --muted: #6b6b8a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

  /* ── LOBBY ── */
  #lobby {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, #1a0533 0%, var(--bg) 70%);
    padding: 20px;
  }
  .card {
    background: var(--surf); border: 1px solid var(--border);
    border-radius: 24px; padding: 32px 28px;
    width: 100%; max-width: 400px;
    box-shadow: 0 0 80px rgba(124,58,237,0.15), 0 30px 60px rgba(0,0,0,0.5);
  }
  .logo { font-family: 'Syne', sans-serif; font-size: 1.9rem; font-weight: 800; text-align: center; background: linear-gradient(135deg, var(--pink) 0%, var(--violet) 60%, var(--cyan) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 4px; }
  .tagline { text-align: center; font-size: 0.72rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 28px; }

  .label { font-size: 0.68rem; font-weight: 600; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; margin-top: 16px; }
  input[type=text] {
    width: 100%; padding: 12px 16px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600;
    outline: none; transition: border-color .2s, box-shadow .2s;
  }
  input[type=text]:focus { border-color: var(--violet); box-shadow: 0 0 0 3px rgba(124,58,237,0.2); }

  .btn-row { display: flex; gap: 10px; margin-top: 22px; }
  .btn {
    flex: 1; padding: 13px;
    border: none; border-radius: 13px;
    font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700;
    cursor: pointer; transition: transform .15s, box-shadow .15s;
  }
  .btn-host { background: linear-gradient(135deg, var(--pink), var(--violet)); color: #fff; box-shadow: 0 0 20px rgba(255,77,141,0.35); }
  .btn-join { background: var(--surf2); color: var(--text); border: 1px solid var(--border); }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }

  .info-box {
    margin-top: 16px; padding: 12px 14px;
    background: var(--surf2); border: 1px solid var(--border);
    border-radius: 12px; font-size: 0.78rem; line-height: 1.6; color: var(--muted);
    display: none;
  }
  .info-box strong { color: var(--cyan); font-size: 1rem; letter-spacing: 1px; }

  /* ── APP ── */
  #app { display: none; flex-direction: column; height: 100vh; }

  .topbar {
    height: 52px; background: var(--surf); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 14px; gap: 10px; flex-shrink: 0;
  }
  .topbar-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; background: linear-gradient(135deg, var(--pink), var(--violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .room-chip { font-size: 0.68rem; font-weight: 700; letter-spacing: 1.5px; background: var(--surf2); border: 1px solid var(--border); color: var(--cyan); padding: 4px 12px; border-radius: 20px; cursor: pointer; title: "Click to copy"; }
  .peers-chip { font-size: 0.68rem; font-weight: 700; background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.25); color: var(--green); padding: 4px 12px; border-radius: 20px; }
  .topbar-spacer { flex: 1; }
  .exit-btn { padding: 5px 12px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #f87171; border-radius: 10px; cursor: pointer; font-size: 0.72rem; font-weight: 600; transition: background .2s; }
  .exit-btn:hover { background: rgba(239,68,68,0.2); }

  .workspace { display: flex; flex: 1; overflow: hidden; }

  /* ── TOOLBAR ── */
  .toolbar {
    width: 64px; background: var(--surf); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center;
    padding: 10px 0; gap: 6px; overflow-y: auto; flex-shrink: 0;
  }
  .sep { width: 36px; height: 1px; background: var(--border); margin: 3px 0; }

  .tbtn {
    width: 42px; height: 42px; border-radius: 11px;
    border: 1px solid transparent; background: transparent;
    font-size: 1.1rem; cursor: pointer; color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; position: relative;
  }
  .tbtn:hover { background: var(--surf2); color: var(--text); }
  .tbtn.on { background: rgba(124,58,237,0.2); border-color: var(--violet); color: var(--text); box-shadow: 0 0 12px rgba(124,58,237,0.3); }

  /* Color picker */
  .cpick-wrap {
    width: 42px; height: 42px; border-radius: 11px;
    border: 1px solid var(--border); background: var(--surf2);
    position: relative; overflow: hidden; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .cpick-dot { width: 28px; height: 28px; border-radius: 8px; pointer-events: none; }
  .cpick-wrap input[type=color] { position: absolute; inset: -6px; width: calc(100% + 12px); height: calc(100% + 12px); opacity: 0; cursor: pointer; }

  /* Swatches */
  .swatches { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 0 8px; }
  .sw {
    width: 20px; height: 20px; border-radius: 6px; cursor: pointer;
    border: 2px solid transparent; transition: transform .12s, border-color .12s;
  }
  .sw:hover { transform: scale(1.25); }
  .sw.sel { border-color: #fff; box-shadow: 0 0 0 2px var(--violet); }

  /* Size */
  .size-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .size-val { font-size: 0.6rem; color: var(--muted); font-weight: 700; }
  input[type=range] {
    -webkit-appearance: none; writing-mode: vertical-lr; direction: rtl;
    width: 6px; height: 64px; background: var(--surf2); border-radius: 3px; outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--violet); box-shadow: 0 0 8px rgba(124,58,237,0.5); cursor: pointer; }

  /* Canvas */
  .canvaswrap { flex: 1; position: relative; background: #fff; }
  #c { position: absolute; top: 0; left: 0; cursor: crosshair; }

  /* Toast */
  #toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--surf); border: 1px solid var(--border);
    color: var(--text); font-size: 0.78rem; font-weight: 600;
    padding: 8px 18px; border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; z-index: 999;
  }
  #toast.show { opacity: 1; }

  @media(max-width:480px) {
    .toolbar { width: 54px; }
    .tbtn, .cpick-wrap { width: 36px; height: 36px; }
    .swatches { gap: 4px; padding: 0 6px; }
    .sw { width: 17px; height: 17px; }
  }
</style>
</head>
<body>

<!-- ── LOBBY ── -->
<div id="lobby">
  <div class="card">
    <div class="logo">DrawTogether</div>
    <div class="tagline">Real-time · Peer to Peer · No signup</div>

    <div class="label">Your Name</div>
    <input type="text" id="iName" placeholder="e.g. Rahul" maxlength="12">

    <div id="joinSection">
      <div class="label">Room ID (sirf Join ke liye)</div>
      <input type="text" id="iRoom" placeholder="Host ka Room ID paste karo" style="letter-spacing:1px;">
    </div>

    <div class="btn-row">
      <button class="btn btn-host" onclick="hostRoom()">🎨 Host Room</button>
      <button class="btn btn-join" onclick="joinRoom()">🔗 Join Room</button>
    </div>

    <div class="info-box" id="hostInfo">
      <div style="margin-bottom:4px; color:var(--muted); font-size:0.7rem;">APNA ROOM ID SHARE KARO</div>
      <strong id="myPeerId">...</strong>
      <div style="margin-top:6px; font-size:0.72rem;">Ye ID copy karke dost ko bhejo, vo Join kare</div>
    </div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <div class="topbar">
    <span class="topbar-logo">DT</span>
    <div class="room-chip" id="roomChip" onclick="copyRoomId()" title="Click to copy Room ID">📋 ROOM ID</div>
    <div class="peers-chip" id="peersChip">● 1 Online</div>
    <div class="topbar-spacer"></div>
    <button class="exit-btn" onclick="location.reload()">✕ Exit</button>
  </div>

  <div class="workspace">
    <div class="toolbar">
      <button class="tbtn on" id="btnBrush" onclick="setTool('brush',this)" title="Brush">🖌️</button>
      <button class="tbtn" id="btnEraser" onclick="setTool('eraser',this)" title="Eraser">⬜</button>
      <div class="sep"></div>
      <div class="cpick-wrap" title="Color picker">
        <div class="cpick-dot" id="cpDot" style="background:#ff4d8d"></div>
        <input type="color" id="cpInput" value="#ff4d8d" oninput="setColor(this.value)">
      </div>
      <div class="sep"></div>
      <div class="swatches" id="swatches"></div>
      <div class="sep"></div>
      <div class="size-col">
        <input type="range" id="szInput" min="2" max="60" value="6" oninput="document.getElementById('szVal').textContent=this.value">
        <div class="size-val" id="szVal">6</div>
      </div>
      <div style="flex:1"></div>
      <div class="sep"></div>
      <button class="tbtn" onclick="clearAll()" title="Clear" style="color:#f87171">🗑️</button>
    </div>

    <div class="canvaswrap" id="cw">
      <canvas id="c"></canvas>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ══════════════════════════════════
   PALETTE & TOOL STATE
══════════════════════════════════ */
const PALETTE = ['#ff4d8d','#ff6b35','#fbbf24','#34d399','#38bdf8','#818cf8','#f472b6','#a78bfa','#ffffff','#94a3b8','#334155','#0f172a'];
let color = '#ff4d8d';
let tool  = 'brush';
let size  = 6;

function buildSwatches() {
  const g = document.getElementById('swatches');
  PALETTE.forEach(c => {
    const d = document.createElement('div');
    d.className = 'sw' + (c === color ? ' sel' : '');
    d.style.background = c;
    d.onclick = () => {
      setColor(c);
      document.getElementById('cpInput').value = c;
      if (tool === 'eraser') setTool('brush', document.getElementById('btnBrush'));
    };
    g.appendChild(d);
  });
}

function setColor(v) {
  color = v;
  document.getElementById('cpDot').style.background = v;
  document.querySelectorAll('.sw').forEach(s => s.classList.toggle('sel', s.style.background === hexToRgb(v) || s.style.background === v));
  if (tool === 'eraser') setTool('brush', document.getElementById('btnBrush'));
}

function hexToRgb(hex) {
  // browsers store color as rgb() so compare properly
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${r}, ${g}, ${b})`;
}

function setTool(t, btn) {
  tool = t;
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('c').style.cursor = t === 'eraser' ? 'cell' : 'crosshair';
}

buildSwatches();

/* ══════════════════════════════════
   CANVAS
══════════════════════════════════ */
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let isDown   = false;
let lastNorm = null; // normalized last position {x,y} in 0..1

function resize() {
  const wrap = document.getElementById('cw');
  // Save pixels
  const snap = ctx.getImageData(0, 0, canvas.width, canvas.height);
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  try { ctx.putImageData(snap, 0, 0); } catch(e) {}
}

// Convert canvas pixel → normalized (0..1)
function toNorm(px, py) {
  return { x: px / canvas.width, y: py / canvas.height };
}

// Convert normalized → canvas pixel
function fromNorm(nx, ny) {
  return { x: nx * canvas.width, y: ny * canvas.height };
}

function getLocalPos(e) {
  const r = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - r.left, y: src.clientY - r.top };
}

/* Draw a segment from norm point A to norm point B */
function drawSegment(nFrom, nTo, col, sz) {
  const from = fromNorm(nFrom.x, nFrom.y);
  const to   = fromNorm(nTo.x,   nTo.y);
  ctx.strokeStyle = col;
  ctx.lineWidth   = sz;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.beginPath();
  ctx.moveTo(from.x, from.y);
  ctx.lineTo(to.x,   to.y);
  ctx.stroke();
}

/* Draw a dot (for single tap/click) */
function drawDot(norm, col, sz) {
  const p = fromNorm(norm.x, norm.y);
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.arc(p.x, p.y, sz / 2, 0, Math.PI * 2);
  ctx.fill();
}

/* ── Local pointer events ── */
function onDown(e) {
  e.preventDefault();
  isDown   = true;
  const lp = getLocalPos(e);
  lastNorm = toNorm(lp.x, lp.y);
  // send start
  broadcast({ type:'start', n: lastNorm, col: drawColor(), sz: drawSize() });
}

function onMove(e) {
  e.preventDefault();
  if (!isDown) return;
  const lp   = getLocalPos(e);
  const norm = toNorm(lp.x, lp.y);
  const col  = drawColor();
  const sz   = drawSize();
  drawSegment(lastNorm, norm, col, sz);
  broadcast({ type:'seg', from: lastNorm, to: norm, col, sz });
  lastNorm = norm;
}

function onUp(e) {
  if (!isDown) return;
  isDown   = false;
  lastNorm = null;
  broadcast({ type:'end' });
}

function drawColor() { return tool === 'eraser' ? '#ffffff' : color; }
function drawSize()  { return +document.getElementById('szInput').value; }

canvas.addEventListener('mousedown',  onDown, {passive:false});
canvas.addEventListener('mousemove',  onMove, {passive:false});
window.addEventListener('mouseup',    onUp);
canvas.addEventListener('touchstart', onDown, {passive:false});
canvas.addEventListener('touchmove',  onMove, {passive:false});
canvas.addEventListener('touchend',   onUp,   {passive:false});
window.addEventListener('resize', resize);

/* ── Remote drawing ── */
const remoteState = {}; // peerId → { lastNorm }

function applyRemote(data, pid) {
  if (!remoteState[pid]) remoteState[pid] = { lastNorm: null };
  const rs = remoteState[pid];

  if (data.type === 'start') {
    rs.lastNorm = data.n;
    drawDot(data.n, data.col, data.sz);
  } else if (data.type === 'seg' && rs.lastNorm) {
    drawSegment(rs.lastNorm, data.to, data.col, data.sz);
    rs.lastNorm = data.to;
  } else if (data.type === 'end') {
    rs.lastNorm = null;
  } else if (data.type === 'clear') {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
}

function clearAll() {
  if (!confirm('Sabka canvas clear ho jayega?')) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  broadcast({ type:'clear' });
}

/* ══════════════════════════════════
   PEER JS — CONNECTION LAYER
══════════════════════════════════ */
let peer = null;
let myId = null;
const conns = {}; // peerId → DataConnection

let isHost  = false;
let peerCount = 1;

function updatePeerCount() {
  const n = Object.keys(conns).length + 1;
  document.getElementById('peersChip').textContent = `● ${n} Online`;
}

/* Send to ALL connected peers */
function broadcast(data, exceptId) {
  Object.entries(conns).forEach(([pid, conn]) => {
    if (pid !== exceptId && conn.open) conn.send(data);
  });
}

/* When we receive data from a peer — also relay if we are host */
function onData(data, fromId) {
  applyRemote(data, fromId);
  if (isHost) broadcast(data, fromId); // relay to others
}

function addConn(conn) {
  const pid = conn.peer;
  conns[pid] = conn;
  conn.on('data',  d  => onData(d, pid));
  conn.on('close', () => { delete conns[pid]; updatePeerCount(); toast(`${pid.slice(0,6)}… left`); });
  conn.on('error', () => { delete conns[pid]; updatePeerCount(); });
  conn.on('open',  () => { updatePeerCount(); toast('Friend connected! 🎉'); });
  updatePeerCount();
}

function initPeer(cb) {
  peer = new Peer(undefined, { debug: 0 });
  peer.on('open', id => { myId = id; if (cb) cb(id); });
  peer.on('connection', conn => {
    // host accepts incoming connections
    addConn(conn);
  });
  peer.on('error', err => toast('Connection error: ' + err.type));
}

/* ── HOST ── */
function hostRoom() {
  const name = document.getElementById('iName').value.trim() || 'Host';
  isHost = true;

  initPeer(id => {
    document.getElementById('myPeerId').textContent = id;
    document.getElementById('hostInfo').style.display = 'block';
    document.querySelector('.btn-host').textContent   = '✅ Waiting...';
    document.querySelector('.btn-host').disabled      = true;

    // after short delay, go to canvas
    setTimeout(() => enterApp(id, name), 600);
  });
}

/* ── JOIN ── */
function joinRoom() {
  const name   = document.getElementById('iName').value.trim() || 'Guest';
  const hostId = document.getElementById('iRoom').value.trim();
  if (!hostId) { toast('Host ka Room ID daalo!'); return; }
  isHost = false;

  initPeer(id => {
    const conn = peer.connect(hostId, { reliable: true });
    addConn(conn);
    conn.on('open', () => enterApp(hostId, name));
    conn.on('error', () => toast('Host se connect nahi ho paya. ID check karo.'));
  });
}

/* ── ENTER APP ── */
function enterApp(roomId, name) {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('app').style.display   = 'flex';

  const short = roomId.slice(0,8) + '…';
  document.getElementById('roomChip').textContent = `📋 ${short}`;
  document.getElementById('roomChip').dataset.full = roomId;

  resize();
  toast(isHost ? '🎨 Room ready! Share your Room ID' : '✅ Connected! Start drawing');
}

function copyRoomId() {
  const id = document.getElementById('roomChip').dataset.full || myId;
  if (!id) return;
  navigator.clipboard.writeText(id).then(() => toast('Room ID copied! 📋')).catch(() => {
    prompt('Ye ID copy karo:', id);
  });
}

/* ── TOAST ── */
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
</body>
</html>
